[audio]
sample_rate = 16000
block_ms = 20
input_device = "default"
output_device = "default"
start_rms = 0.012
continue_rms = 0.007
pre_roll_ms = 100
end_silence_ms = 360
# Live preview disabled: final STT gets CPU priority and queues stay latest-only.
live_preview_enabled = false
live_preview_interval_ms = 1800
live_preview_min_speech_ms = 1800
live_preview_max_audio_ms = 2200
live_preview_max_revisions = 1
live_preview_final_grace_ms = 0
tail_keep_ms = 180
# Staff mode keeps the same silence cutoff as customer mode, but allows longer
# captured utterances and preserves a little more ending audio.
staff_end_silence_ms = 360
staff_tail_keep_ms = 360
staff_max_utterance_ms = 20000
# Legacy live-caption keys retained for old local config compatibility.
# Legacy keys retained for old local config compatibility.
preview_enabled = false
preview_interval_ms = 1400
preview_min_speech_ms = 900
preview_max_audio_ms = 3600
min_speech_ms = 180
max_utterance_ms = 12000
post_tts_mute_ms = 500

[stt]
model = "small"
device = "cpu"
compute_type = "int8"
beam_size = 1
# Low-cost decoder guard against loops such as "check check check check".
repetition_penalty = 1.08
no_repeat_ngram_size = 2
# Decode once at beam 1. Only low-confidence or looped results get a beam-2 retry.
quality_retry_enabled = true
quality_retry_beam_size = 2
quality_retry_log_prob_threshold = -0.9
cpu_threads = 6
num_workers = 1
# Live-caption keys retained only for config compatibility. Disabled by audio.live_preview_enabled=false.
live_model = "base"
live_cpu_threads = 2
live_beam_size = 1
live_hotwords_max_items = 0
preview_beam_size = 1
# Legacy values retained only for config compatibility. This mode does not probe languages.
japanese_probe_ms = 1200
japanese_probe_margin = 0.03
language = "auto"
japanese_reply_threshold = 0.5
enabled_language_min_probability = 0.35
hotwords = ["콜라 주세요", "콜라", "진저에일", "cola", "ginger ale"]

[stt.corrections]
"콜을 주세요" = "콜라 주세요"
"콜라주세요" = "콜라 주세요"
"진저일" = "진저에일"

