[translation]
backend = "hymt2"
model = "facebook/m2m100_418M"
device = "cpu"
max_new_tokens = 128
hymt2_model = "models/hymt2/Hy-MT2-1.8B-Q4_K_M.gguf"
hymt2_runtime = "models/hymt2/llama"
# Translation latency is operator-critical. Keep the established 8-thread
# setting; STT quality safeguards must never add a second translation pass.
hymt2_threads = 8
hymt2_context = 1024
hymt2_timeout_seconds = 45
hymt2_request_timeout_seconds = 15
hymt2_startup_poll_ms = 80
hymt2_preview_max_tokens = 72
hymt2_warmup = true

