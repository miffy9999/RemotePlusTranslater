[tts]
enabled = true
volume = 0.9
# Verified local ONNX voices. No reply text leaves the computer and Windows
# speech language packs are not required.
backend = "local"
# Portable releases include every reviewed voice pack. Automatic installation
# remains enabled only as a repair/fallback path for a missing pack.
auto_install_voice_packs = true
local_threads = 2
local_kokoro_threads = 4
local_speed = 1.0
local_steps = 5
local_speaker_id = 0
# Legacy compatibility setting. The app does not prepend an AI announcement.
disclose_synthetic_voice = false
edge_rate = "+0%"
edge_timeout_seconds = 15
edge_retry_count = 1
fallback_to_sapi = false # legacy compatibility only; SAPI is not used
latest_only = true

[conversation]
japanese_code = "ja"
language_lock = "auto"
reply_language = "auto"
language_memory_seconds = 90
minimum_language_probability = 0.55
enabled_languages = ["en", "ko", "zh", "es", "fr", "de", "it", "pt", "ru", "ar", "hi", "vi", "th", "id", "ms", "tr", "nl", "pl", "uk", "cs", "he"]

[server]
host = "127.0.0.1"
port = 8765
open_browser = true
shutdown_when_idle = true
auto_shutdown_no_clients_seconds = 10
