<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RemotePlus Translator</title>
  <link rel="stylesheet" href="/assets/app.css?v=reading-guide-contrast-20260709">
  <link rel="stylesheet" href="/assets/device.css">
</head>
<body>
  <header>
    <div class="brand"><span class="mark">RP</span><div><h1>RemotePlus</h1><p data-i18n="subtitle">フロントデスク通訳コンソール</p></div></div>
    <div class="header-actions">
      <label class="ui-language"><span data-i18n="uiLanguage">表示言語</span><select id="ui-language"><option value="ja">日本語</option><option value="ko">한국어</option><option value="en">English</option><option value="zh">中文</option><option value="es">Español</option></select></label>
      <div id="connection" class="connection"><i></i><span data-i18n="connecting">接続中</span></div>
    </div>
  </header>

  <main>
    <section class="panel controls">
      <div class="panel-title">
        <span data-i18n="channelSettings">現場設定</span>
        <div id="phase" class="phase"><span class="pulse"></span><strong data-i18n="starting">起動中</strong></div>
      </div>
      <div class="control-stack">
        <div class="status-strip">
          <div><small data-i18n="detectedLanguage">現在のお客様言語</small><strong id="partner">-</strong></div>
          <button id="pause" class="primary" data-i18n="pause">一時停止</button>
        </div>

        <label class="field main-field"><span data-i18n="inputLanguage">お客様の入力言語</span><select id="language"></select></label>
        <label class="field"><span data-i18n="inputDevice">音声入力デバイス</span><select id="input-device"><option value="default" data-i18n="systemDefault">システム既定</option></select></label>
        <label class="field"><span data-i18n="outputDevice">音声出力デバイス</span><select id="output-device"><option value="default" data-i18n="systemDefault">システム既定</option></select></label>

        <div class="quick-controls">
          <div class="speech-mode-wrap">
            <span data-i18n="speechMode">認識モード</span>
            <button id="speech-mode" class="speech-mode" type="button" aria-pressed="false" title="Hold Space while staff speaks"><span></span><em data-i18n="staffSpeech">スタッフ発話・Spaceを押している間</em></button>
          </div>
          <button id="tts" class="toggle on" aria-pressed="true"><span></span><em data-i18n="ttsOn">TTS オン</em></button>
          <button id="install-voice" class="primary" type="button" data-i18n="installVoice" hidden>音声をインストール</button>
        </div>
      </div>
    </section>

    <section class="panel output">
      <div class="panel-title"><span data-i18n="output">会話ログ</span><span><small data-i18n="outputHint">最新発話優先</small><button id="clear-history" class="mini" data-i18n="clearHistory">履歴を消去</button></span></div>
      <div id="feed" class="feed" aria-live="polite">
        <div id="empty" class="empty">
          <h3 data-i18n="loadingTitle">システムを準備しています</h3>
          <p data-i18n="loadingBody">準備が完了するとお客様の音声を聞き始めます。</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/assets/app.js?v=staff-partner-ja-default-20260713"></script>
</body>
</html>
