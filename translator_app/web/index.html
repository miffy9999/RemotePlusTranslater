<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RemotePlus Translator</title>
  <link rel="stylesheet" href="/assets/app.css">
  <link rel="stylesheet" href="/assets/device.css">
</head>
<body>
  <header>
    <div class="brand"><span class="mark">RP</span><div><h1>RemotePlus</h1><p data-i18n="subtitle">프런트 데스크 통역 콘솔</p></div></div>
    <div class="header-actions">
      <label class="ui-language"><span data-i18n="uiLanguage">화면 언어</span><select id="ui-language"><option value="ja">日本語</option><option value="ko">한국어</option><option value="en">English</option><option value="zh">中文</option><option value="es">Español</option></select></label>
      <div id="connection" class="connection"><i></i><span data-i18n="connecting">연결 중</span></div>
    </div>
  </header>

  <main>
    <section class="panel controls">
      <div class="panel-title">
        <span data-i18n="channelSettings">현장 설정</span>
        <div id="phase" class="phase"><span class="pulse"></span><strong data-i18n="starting">시작 중</strong></div>
      </div>
      <div class="control-stack">
        <div class="status-strip">
          <div><small data-i18n="detectedLanguage">현재 고객 언어</small><strong id="partner">-</strong></div>
          <button id="pause" class="primary" data-i18n="pause">일시 정지</button>
        </div>

        <label class="field main-field"><span data-i18n="inputLanguage">고객 입력 언어</span><select id="language"></select></label>
        <label class="field"><span data-i18n="inputDevice">음성 입력 장치</span><select id="input-device"><option value="default" data-i18n="systemDefault">시스템 기본 장치</option></select></label>
        <label class="field"><span data-i18n="outputDevice">음성 출력 장치</span><select id="output-device"><option value="default" data-i18n="systemDefault">시스템 기본 장치</option></select></label>

        <div class="quick-controls">
          <div class="speech-mode-wrap">
            <span data-i18n="speechMode">인식 모드</span>
            <button id="speech-mode" class="speech-mode" type="button" aria-pressed="false" title="Hold Space while staff speaks"><span></span><em data-i18n="staffSpeech">직원 말하기 · Space 누르는 동안</em></button>
          </div>
          <button id="tts" class="toggle on" aria-pressed="true"><span></span><em data-i18n="ttsOn">TTS 켜짐</em></button>
        </div>
      </div>
    </section>

    <section class="panel output">
      <div class="panel-title"><span data-i18n="output">대화 기록</span><span><small data-i18n="outputHint">최신 발화 우선</small><button id="clear-history" class="mini" data-i18n="clearHistory">기록 지우기</button></span></div>
      <div id="feed" class="feed" aria-live="polite">
        <div id="empty" class="empty">
          <h3 data-i18n="loadingTitle">시스템을 준비하고 있습니다</h3>
          <p data-i18n="loadingBody">준비가 끝나면 고객 음성을 듣기 시작합니다.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/assets/app.js"></script>
</body>
</html>
